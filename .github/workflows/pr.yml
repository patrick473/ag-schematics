name: PR

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ag-schematics

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ag-schematics/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ag-schematics

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ag-schematics/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

  build-and-test:
    runs-on: ubuntu-latest
    needs: [lint, format]
    defaults:
      run:
        working-directory: ag-schematics

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ag-schematics/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ag-schematics/coverage/
          retention-days: 7

      - name: Coverage report comment
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: ag-schematics
          min-coverage-changed-files: 80

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"
          output: codeql-results

      - name: Comment CodeQL results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'codeql-results';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.sarif'));
            let results = [];
            for (const file of files) {
              const sarif = JSON.parse(fs.readFileSync(path.join(dir, file), 'utf8'));
              for (const run of sarif.runs || []) {
                for (const result of run.results || []) {
                  const location = result.locations?.[0]?.physicalLocation;
                  results.push({
                    level: result.level || 'warning',
                    rule: result.ruleId,
                    message: result.message?.text,
                    file: location?.artifactLocation?.uri,
                    line: location?.region?.startLine,
                  });
                }
              }
            }
            let body = '## CodeQL Analysis\n\n';
            if (results.length === 0) {
              body += '✅ No issues found.';
            } else {
              body += `⚠️ ${results.length} issue(s) found:\n\n`;
              body += '| Severity | Rule | Location | Message |\n';
              body += '|----------|------|----------|---------|\n';
              for (const r of results) {
                const loc = r.file ? `${r.file}${r.line ? `:${r.line}` : ''}` : 'N/A';
                body += `| ${r.level} | \`${r.rule}\` | ${loc} | ${r.message} |\n`;
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });


